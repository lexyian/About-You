<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> About You </title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+prime:ital@0;1&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box;}

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'courier Prime' , monospace;
            overflow-y: hidden;
        }

        .title-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            animation: fadeOut 1s ease 2s forwards;
            pointer-events: none;
        }

        .title-text {
            color: aliceblue;
            font-family: 'Special Elite', cursive;
            font-size: 1.1rem;
            letter-spacing: 0.05em;
            opacity: 0;
            animation: fadeIn 1s ease 0.3s forwards;
        }

        body::before{
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 60% 40%, #1a1a1a 0%, #050505 70%);
            z-index: 0;
        }

        .scene {
            position: relative;
            z-index: 1;
            opacity: 0;
            transform: perspective(800px) rotateX(8deg) rotateY('-4deg');
            animation: paperReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) 2.5s forwards;
        }

        .paper {
            width: min(480px, 88vw);
            height: 70vh;
            overflow-y: auto;
            background: linear-gradient(to bottom right, #f2f0eb, #e8e4dc);
            border-radius: 4px 12px 12px 4px;
            box-shadow:
            -2px 0 0 #c8c4bb,
            4px 8px 30px rgba(0,0,0,0.6),
            8px 16px 60px rgba(0,0,0,0.4),
            0 0 80px rgba(0,0,0,0.3);
            position: relative;
            transform-style: preserve-3d;
        }


        .paper-inner {
            min-height: 100%;
            padding: 40px 40px 50px 70px;
            position: relative;
            background-image:
        repeating-linear-gradient(
            180deg,
            transparent 0px,
            transparent 31px,
            rgba(180, 190, 220, 0.35) 31px,
            rgba(180, 190, 220, 0.35) 32px
        ),
        linear-gradient(
            to right,
            transparent 59px,
            rgba(220, 120, 120, 0.4) 59px,
            rgba(220, 120, 120, 0.4) 60px,
            transparent 60px
        );
            background-position: 0 56px, 0 0;
            background-size: 100% 32px, 100% 100%;
        }

        .paper::-webkit-scrollbar {
            display: none;
        }

        .paper {
            scrollbar-width: none;
        }

        .holes {
            position: absolute;
            left: 22px;
            top: 30px;
            bottom: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 0;
        }

        .hole {
            width: 12px;
            height: 12px;
            border: 50%;
            background: #1a1a1a;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0,8), 0 0 0 1px #333;
        }

    .paper::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;

    background-image: repeating-linear-gradient(
        180deg,
        transparent 0px,
        transparent 30px,
        rgba(180,190,220,0.35) 30px,
        rgba(180,190,220,0.35) 31px
    );

    background-position: 0 55px;
}

        .paper::before {
            content: '';
            position: absolute;
            left: 60px;
            top: 0;
            bottom: 0;
            width: 1px;
            background: rgba(220, 120, 120, 0.4);
            border-radius: 0%;
            pointer-events: none;
            z-index: 1;
        }

        .letter {
    position: relative;
    z-index: 2;
    color: #1a1a1a;
    font-family: 'Courier Prime', monospace;

    font-size: 0.9rem;
    line-height: 32px;
    max-width: 300px;
}

        .letter p {
            margin-bottom: 1.2rem;
            overflow: hidden;
        }

        .letter {
            word-wrap: break-word;
        }

        .letter p span {
            display: inline;
            opacity: 0;
            animation: typeIn 0.05s ease forwards;
        }

        .doodle {
            position: absolute;
            bottom: 40px;
            right: 50px;
            opacity: 0.15;
            z-index: 2;
        }

        @keyframes fadeIn {
            to {opacity: 1;}
        }

        @keyframes fadeOut {
            to {opacity: 0;}
        }

        @keyframes paperReveal {
            to {opacity: 1;
                transform: perspective(800px) rotateX(4deg) rotateY('-2deg');
            }
        }

        @keyframes typeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

<div class="title-screen">
    <p class="title-text">I hope your reading this, even if it's to late.</p>
</div>

<div class="scene">
    <div class="paper">
    <div class="paper-inner">
        <div class="holes" id="holes"></div>
        <div class="letter" id="letter"></div>
        <svg class="doodle" width="60" height="70" viewBox="0 0 60 70" fill="none" xmlns="http://www.w3.org/2000/svg">
            <line x1="30 y1=70" x2="30" y2="20" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="30 y1=55" x2="18" y2="45" stroke="#333" stroke-width="1" stroke-linecap="round"/>
            <line x1="30 y1=48" x2="42" y2="38" stroke="#333" stroke-width="1" stroke-linecap="round"/>
            <ellipse cx="30" cy="16" rx="14" ry="16" fill="#333" opacity="0.6"/>
        </svg>
    </div>
</div>


<script>
    const letterEl = document.getElementById("letter");

const paragraphs = [
"I don't know if you'll ever read this,\nbut I guess I needed to write it anyway.",
"There are things I never really got\nto say properly. Things that stayed\nquiet inside me for a long time.",
"Loving you wasn't something I planned.\nIt just happened slowly,\nand before I knew it, you mattered\nto me more than I expected.",
"I didn't fall in love with\nwhat you could give me.\nI fell in love with who you are,\nwith your thoughts, your flaws,\nand the parts of you\nthat not everyone gets to see.",
"And even now, I can't say\nI regret any of it.\nBecause loving you taught me\nhow deeply I can care\nfor another person.",
"Maybe we didn't get the ending\nI once imagined.\nMaybe life simply had\nother plans for us.",
"But that doesn't make\nwhat we had any less real.",
"A part of me will probably\nalways care about you.\nNot in a way that holds you back,\nbut in a quiet way\nthat simply wishes you well.",
"And if one day our paths\nnever cross again,\nI hope you remember\nthat somewhere in your story\nthere was someone\nwho truly loved you.",
"And maybe that will always\nbe enough for me."
];

let totalDelay = 3200;

paragraphs.forEach(text => {

    const p = document.createElement("p");
    const chars = text.split("");

    chars.forEach((ch, i) => {

        if (ch === "\n") {
            p.appendChild(document.createElement("br"));
            return;
        }

        const span = document.createElement("span");
        span.textContent = ch;
        span.style.animationDelay = `${totalDelay + i * 28}ms`;

        p.appendChild(span);
    });

    totalDelay += chars.length * 28 + 500;

    letterEl.appendChild(p);
});
</script>
</body>
</html>
